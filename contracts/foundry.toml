[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"
via_ir = true
optimizer = true
optimizer_runs = 200

[profile.default.rpc_endpoints]
base = "${BASE_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"

[profile.default.etherscan]
base = { key = "${BASESCAN_API_KEY}", chain = 8453 }
base_sepolia = { key = "${BASESCAN_API_KEY}", chain = 84532 }
