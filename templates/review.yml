name: Terrarium Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: vars.TERRARIUM_AUTO_REVIEW == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download terrarium-owner
        run: |
          RELEASE_URL="https://github.com/jbrower95/terrarium/releases/latest/download/terrarium-owner-linux-x86_64"
          curl -sL "$RELEASE_URL" -o terrarium-owner
          chmod +x terrarium-owner

      - name: Review PR
        env:
          TERRARIUM_REVIEW_MODE: "true"
          TERRARIUM_PR_NUMBER: ${{ github.event.pull_request.number }}
          TERRARIUM_MODEL_OWNER: ${{ vars.TERRARIUM_MODEL_OWNER }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: ./terrarium-owner
