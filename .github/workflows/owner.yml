name: Terrarium Owner

on:
  workflow_call:
    secrets:
      OPENROUTER_API_KEY:
        required: true

concurrency:
  group: terrarium-owner-${{ github.repository }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write
  issues: write
  pull-requests: write
  actions: write

jobs:
  owner:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/jbrower95/terrarium-owner:latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config --global user.name "terrarium[bot]"
          git config --global user.email "terrarium[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Run owner cycle
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TERRARIUM_MODEL_OWNER: ${{ vars.TERRARIUM_MODEL_OWNER }}
          TERRARIUM_MODEL_HIGH: ${{ vars.TERRARIUM_MODEL_HIGH }}
          TERRARIUM_MODEL_MEDIUM: ${{ vars.TERRARIUM_MODEL_MEDIUM }}
          TERRARIUM_MODEL_LOW: ${{ vars.TERRARIUM_MODEL_LOW }}
          TERRARIUM_AUTO_REVIEW: ${{ vars.TERRARIUM_AUTO_REVIEW }}
          TERRARIUM_WALLET: ${{ vars.TERRARIUM_WALLET }}
          TERRARIUM_TOKEN: ${{ vars.TERRARIUM_TOKEN }}
          BASE_RPC_URL: ${{ vars.BASE_RPC_URL }}
        run: |
          terrarium-owner 2>&1 | tee owner-output.log
          # Extract artifact JSON (last line of stdout)
          tail -1 owner-output.log > artifact.json

      - name: Upload run artifact
        uses: actions/upload-artifact@v4
        with:
          name: terrarium-owner-${{ github.run_id }}
          path: artifact.json
          retention-days: 90

      - name: Push changes
        run: |
          git add JOURNAL.md README.md .github/workflows/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "terrarium: owner cycle $(date -u +%Y-%m-%dT%H:%M:%S)"
          # Try pushing directly; if branch protection blocks it, push via a PR
          if ! git push 2>/dev/null; then
            BRANCH="terrarium/journal-$(date -u +%Y%m%d%H%M%S)"
            git checkout -b "$BRANCH"
            git push -u origin "$BRANCH"
            gh pr create --title "terrarium: owner cycle update" --body "Automated journal and status update." --head "$BRANCH" || true
            gh pr merge "$BRANCH" --merge --auto || true
          fi
